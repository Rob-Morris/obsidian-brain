name: Linux test suite

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  linux-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: make install

      - name: Run test suite
        run: make test

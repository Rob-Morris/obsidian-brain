required:
  type:
    const: "living/workspace"
  key:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
  tags:
    type: array
    contains: "workspace/{key}"
optional:
  status:
    enum: [active, parked, completed]
    default: active
  workspace_mode:
    enum: [embedded, linked]
    default: embedded

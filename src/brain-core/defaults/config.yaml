# Brain vault configuration
#
# Two zones:
#   vault:    shared authority — not overridable by .brain/local/config.yaml
#   defaults: customisable per-machine via .brain/local/config.yaml
#
# Merge rules within defaults (inferred from data type):
#   Scalars:  local wins if present
#   Booleans: either-true wins (if either file says true, it's true)
#   Lists:    additive (union of both lists)

vault:
  brain_name: ""

  profiles:
    reader:
      allow: [brain_init, brain_session, brain_read, brain_search, brain_list]
    contributor:
      allow: [brain_init, brain_session, brain_read, brain_search, brain_list, brain_create, brain_edit]
    operator:
      allow: [brain_init, brain_session, brain_read, brain_search, brain_list, brain_create, brain_edit, brain_move, brain_action]

  operators: []

defaults:
  default_profile: operator

  flags: {}

  tool_paths: {}

  exclude:
    artefact_sync: []
